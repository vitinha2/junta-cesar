<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junta de Freguesia de Cesar - Gestão 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="mainContainer">
        
        <section id="loginSection">
            <header>
                <div class="logo-wrapper">
                    <img src="imagens/cesarsempre2.png" alt="Cesar Sempre" class="logo-junta">
                </div>
                <p>Acesso Restrito - Gestão de Equipamentos</p>
            </header>
            <form id="loginForm">
                <label>Email Institucional</label>
                <input type="email" id="loginEmail" placeholder="" required>
                <label>Palavra-passe</label>
                <input type="password" id="loginPass" placeholder="" required>
                <button type="submit" id="btnLoginOriginal">Entrar no Sistema</button>
            </form>
            <p id="loginErro" class="erro-msg" style="display: none;">Credenciais incorretas!</p>
        </section>

        <section id="reservaSection" style="display: none;">
            <header>
                <div class="logo-wrapper">
                    <img src="imagens/cesarsempre2.png" alt="Cesar Sempre" class="logo-junta-mini">
                </div>
                <h1>Painel de Controlo</h1>
                <div class="nav-tabs">
                    <button onclick="alternarVista('agenda')" id="btnAgenda" class="active">Agenda</button>
                    <button onclick="alternarVista('historico')" id="btnHistorico">Gerir Histórico</button>
                </div>
            </header>

            <div id="vistaAgenda">
                <div class="agenda-checker">
                    <label>Equipamento/Espaço:</label>
                    <select id="checkEquipamento" onchange="verificarDisponibilidade()">
                        <option value="Equipamento de Som">Equipamento de Som</option>
                        <option value="Carrinha da Junta">Carrinha da Junta</option>
                        <option value="Projetor">Projetor</option> <option value="Tela">Tela</option>
                        <option value="Bandeira/Estandarte">Bandeira/Estandarte</option>
                        <option value="Painel Publicitário">Painel Publicitário</option>
                        <option value="Tenda Madeira 1">Tenda Madeira 1</option>
                        <option value="Tenda Madeira 2">Tenda Madeira 2</option> 
                        <option value="Tenda Madeira 3">Tenda Madeira 3</option>
                        <option value="Tenda Madeira 4">Tenda Madeira 4</option>
                        <option value="Centro Civico">Centro Civico</option>
                        <option value="Salão Nobre">Salão Nobre</option>
                        <option value="Sala R/C">Sala R/C</option>
                        <option value="Sala Leitura">Sala Leitura</option>
                        <option value="Sala GC 1º Andar ">Sala GC 1º Andar</option>
                        <option value="Casa Gastronomia">Casa Gastronomia</option>
                        <option value="Bar/WC/Parque/ Merendas">Bar/WC/Parque/ Merendas</option>
                        <option value="Nucleo Ruralidade ">Nucleo Ruralidade</option>
                    </select>

                    <label>Data:</label>
                    <input type="date" id="checkData" onchange="verificarDisponibilidade()">

                    <div id="statusPainel" class="status-box">
                        Selecione uma data para verificar...
                    </div>
                </div>

                <div id="formularioReserva" class="form-container" style="display: none;">
                    <h3 id="tituloForm">Nova Reserva</h3>
                    <form id="reservaForm">
                        <input type="hidden" id="editIndex" value="-1">
                        <input type="hidden" id="finalEquipamento">
                        <input type="hidden" id="finalData">
                        
                        <label>Entidade Requerente:</label>
                        <input type="text" id="nome" placeholder="Associação / Pessoa" required>

                        <label>Contacto Telefónico:</label>
                        <input type="tel" id="contacto" placeholder="9xx xxx xxx" required>

                        <label>Hora de Início:</label>
                        <input type="time" id="hora" required>

                        <label>Observações (Opcional):</label>
                        <textarea id="obs" placeholder="Notas adicionais..." rows="3"></textarea>
                        
                        <button type="submit" class="btn-reserva" id="btnConfirmarForm">Confirmar e Gravar</button>
                        <button type="button" onclick="cancelarMarcacao()" class="btn-cancel">Cancelar</button>
                    </form>
                </div>
            </div>

            <div id="vistaHistorico" style="display: none;">
                <h3>Lista de Reservas 2026</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Local</th>
                                <th>Dados da Reserva</th>
                                <th style="text-align:center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela"></tbody>
                    </table>
                </div>
            </div>

            <button type="button" onclick="logout()" class="btn-logout">Sair do Sistema</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
